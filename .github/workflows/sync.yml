name: sync

on:
  workflow_dispatch: {}
  schedule:
    # times in UTC. busier window (=07:00-24:00 local) every 10 min,
    # quiet window (=00:00-07:00 local) every 30 min
    - cron: "*/10 4-20 * * *"
    - cron: "*/30 21-23,0-3 * * *"

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - run: node sync.mjs
        env:
          SOURCE_URL: ${{ vars.SOURCE_URL }}
          SINK_URL: ${{ vars.SINK_URL }}
          SINK_TOKEN: ${{ secrets.INGEST_SECRET }}
